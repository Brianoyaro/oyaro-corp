spring.config.import=optional:file:.env[.properties]

spring.application.name=e-commerce

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false #true for development/debugging

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY}
jwt.access.token.expiration=900000
jwt.refresh.token.expiration=604800000
jwt.issuer=authentication-service
jwt.audience=authentication-client

# set logging level to Debug
logging.level.org.springframework.security=DEBUG

# Paystack
paystack.secret=${PAYSTACK_SECRET}
paystack.base-url=${PAYSTACK_BASE_URL}


